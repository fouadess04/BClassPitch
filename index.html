<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BClass — Choose Language</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description"
    content="BClass interactive pitch deck presentation. Choose between English and French versions.">
  <!-- <meta name="keywords" content="BClass, Pitch Deck, Presentation, Interactive, Education"> -->
  <meta name="author" content="ESSAIDI Fouad - Bigovi">
  <meta property="og:title" content="BClass Pitch Deck">
  <meta property="og:description" content="BClass interactive pitch deck presentation.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="Assets/bclass-logo.png">
  <link rel="icon" type="image/png" href="Assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary-blue: #0E4B8A;
      --primary-blue-deep: #0A3868;
      --active-green: #1E7833;
      --active-green-deep: #155726;
      --canvas-bg: #FFFFFF;
      --neutral-text: #2C3E50;
      --card-canvas: #F8FAFC;
      --sans: 'Manrope', system-ui, sans-serif;
      --serif: 'Lora', Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: var(--serif);
      color: var(--neutral-text);
      background-color: #FFFFFF;
      background-image: radial-gradient(circle at 1px 1px, rgba(14, 75, 138, 0.09) 1.4px, transparent 0);
      background-size: 38px 38px;
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .card {
      background: linear-gradient(150deg, var(--primary-blue) 0%, var(--primary-blue-deep) 55%, #082b50 100%);
      color: #fff;
      padding: 60px 70px;
      border-radius: 18px;
      box-shadow: 0 40px 90px -30px rgba(8, 40, 80, .55);
      text-align: center;
      position: relative;
      overflow: hidden;
      max-width: 600px;
      width: 90%;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 12%, rgba(255, 255, 255, .10), transparent 45%),
        radial-gradient(circle at 10% 90%, rgba(30, 120, 51, .25), transparent 50%);
      pointer-events: none;
    }

    .logo-mark {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: var(--sans);
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 16px;
      position: relative;
      z-index: 1;
    }

    p {
      font-style: italic;
      font-size: 1.25rem;
      color: #D8E8FA;
      margin: 0 0 40px;
      position: relative;
      z-index: 1;
    }

    .button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .btn {
      font-family: var(--sans);
      font-size: 1.05rem;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: 9999px;
      padding: 12px 28px;
      color: #fff;
      text-decoration: none;
      transition: all 0.2s;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, .22);
      border-color: rgba(255, 255, 255, .4);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="logo-mark" src="Assets/bclass-logo.png" alt="BClass logo">
    <h1>BClass Pitch Deck</h1>
    <p>Please select your preferred language</p>
    <div class="button-group">
      <a href="en.html" class="btn">🇺🇸 English</a>
      <a href="fr.html" class="btn">🇫🇷 Français</a>
    </div>
  </div>
</body>

</html>
